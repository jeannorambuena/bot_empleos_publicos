name: Refresh real data

on:
  workflow_dispatch:
    inputs:
      send_telegram:
        description: "Enviar Telegram real después de validar el preview"
        required: false
        default: false
        type: boolean
  schedule:
    # 12:00 UTC, lunes a viernes. Corresponde aproximadamente a la mañana de
    # Chile y puede variar según el horario de verano.
    - cron: "0 12 * * 1-5"

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh-real-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Fetch Empleos Publicos data
        run: python scripts/fetch_empleos_publicos.py

      - name: Validate real data
        run: python scripts/check_real_data.py

      - name: Validate human feedback configuration
        run: python scripts/check_feedback_config.py

      - name: Build public dashboard data
        run: python scripts/build_public_data_from_real.py

      - name: Validate public dashboard data
        run: python scripts/check_public_data.py

      - name: Validate public opportunity history
        run: python scripts/check_history.py

      - name: Analyze real scoring
        run: python scripts/analyze_real_scoring.py

      - name: Validate Pages readiness
        run: python scripts/check_pages_ready.py

      - name: Build email alert preview
        run: python scripts/build_alert_preview.py

      - name: Validate email alert preview
        run: python scripts/check_alert_preview.py

      - name: Build calendar preview
        run: python scripts/build_calendar_preview.py

      - name: Validate calendar preview
        run: python scripts/check_calendar_preview.py

      - name: Build Telegram preview
        run: python scripts/build_telegram_preview.py

      - name: Validate Telegram preview
        run: python scripts/check_telegram_preview.py

      - name: Validate configured sources
        run: python scripts/check_sources_config.py

      - name: Validate human review panel
        run: python scripts/check_review_panel.py

      - name: Send Telegram alert after explicit manual request
        if: github.event_name == 'workflow_dispatch' && inputs.send_telegram == true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_telegram_alerts.py --send

      - name: Show Git diagnostics
        run: |
          git status --short
          git diff -- public/data/

      - name: Check for public data changes
        id: public-data
        shell: bash
        run: |
          if git diff --quiet -- public/data/opportunities.json public/data/summary.json public/data/last_run.json public/data/history.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No public data changes to commit"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Public data changes detected"
          fi

      - name: Commit refreshed public data
        if: steps.public-data.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- public/data/opportunities.json public/data/summary.json public/data/last_run.json public/data/history.json
          git status --short
          git diff --cached --stat
          git commit -m "chore(data): refresh empleos publicos dashboard data"
          git push origin HEAD:main

      # Pushes created with GITHUB_TOKEN do not start other workflows. Dispatch
      # Pages explicitly after the scoped data commit, without using a PAT.
      - name: Dispatch GitHub Pages deployment
        if: steps.public-data.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
